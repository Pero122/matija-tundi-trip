    if(F.type&&d.type!==F.type)return false;
    if(F.cat&&d.cat!==F.cat)return false;
    if(F.sub&&!(d.sub||"").includes(F.sub))return false;
    if(F.minr&&!(d.r>=F.minr))return false;
    if(F.minv&&!(d.rv>=F.minv))return false;
    if(F.q&&!d.n.toLowerCase().includes(F.q))return false;
    if(F.hideno&&(picks[key(d)]||{}).p==="no")return false;
    return true;});
  rows.sort((a,b)=> F.sort==="n"?a.n.localeCompare(b.n):(b[F.sort]||0)-(a[F.sort]||0));
  grid.innerHTML="";
  rows.slice(0,600).forEach(d=>{
    const k=key(d),o=picks[k]||{},st=o.p||"";
    const esc=s=>(s||"").replace(/"/g,'&quot;');
    const el=document.createElement("div");
    el.className="card"+(st==="yes"?" pick":st==="no"?" no":"");
    el.innerHTML=`<div class="ph" style="${d.img?`background-image:url('${d.img}')`:''}">
      <div class="badges"><span class="tag ${d.type==='venue'?'ven':'exp'}">${d.type==='venue'?'🏛️':'🎟️'} ${d.type}</span>
      ${d.badge?`<span class="tag bdg">🏆</span>`:''}</div></div>
      <div class="body">
      <div class="nm"><a href="${d.url}" target="_blank" rel="noopener">${d.n}</a></div>
      <div class="meta"><span class="star">${d.r?d.r.toFixed(1)+'★':'—'}</span><span>${d.rv.toLocaleString()} rev</span></div>
      <div class="sub">${d.sub||'&nbsp;'}</div>
      ${d.blurb?`<div class="blurb">${d.blurb}</div>`:''}
      <div class="cat">${d.city==='budapest'?'🇭🇺':'🇬🇧'} ${d.cat}</div>
      <div class="pickrow"><button class="yes ${st==='yes'?'on':''}">✅ keep</button><button class="no ${st==='no'?'on':''}">❌ skip</button></div>
      <div class="notes">
        <input class="nin mnote" placeholder="📝 Matija…" value="${esc(o.m)}">
        <input class="nin tnote" placeholder="📝 Tündi…" value="${esc(o.t)}">
      </div>
      </div>`;
    const [yes,no]=el.querySelectorAll(".pickrow button");
    yes.onclick=()=>{const x=picks[k]||(picks[k]={});x.p=x.p==="yes"?undefined:"yes";save();};
    no.onclick=()=>{const x=picks[k]||(picks[k]={});x.p=x.p==="no"?undefined:"no";save();};
    const mn=el.querySelector(".mnote"),tn=el.querySelector(".tnote");
    mn.oninput=()=>{(picks[k]||(picks[k]={})).m=mn.value;persist();};
    tn.oninput=()=>{(picks[k]||(picks[k]={})).t=tn.value;persist();};
    grid.appendChild(el);
  });
  $("#shown").textContent=rows.length;
  $("#empty").hidden=rows.length>0;
  $("#np").textContent=Object.values(picks).filter(v=>v&&v.p==="yes").length;
}
function persist(){
  for(const k in picks){const o=picks[k];
    if(!o||(!o.p&&!(o.m&&o.m.trim())&&!(o.t&&o.t.trim())))delete picks[k];}
  localStorage.setItem(KEY,JSON.stringify(picks));
  $("#np").textContent=Object.values(picks).filter(v=>v&&v.p==="yes").length;
}
function save(){persist();render();}   // pick toggles re-render; note inputs only persist (keep focus)
// wire controls
document.querySelectorAll(".seg").forEach(seg=>seg.querySelectorAll("button").forEach(b=>b.onclick=()=>{
  seg.querySelectorAll("button").forEach(x=>x.classList.remove("on"));b.classList.add("on");
  F[seg.id]=b.dataset.v; if(seg.id==="cat")refreshSubs(); render();}));
$("#cat").onchange=e=>{F.cat=e.target.value;refreshSubs();render()};
$("#sub").onchange=e=>{F.sub=e.target.value;render()};
$("#minr").onchange=e=>{F.minr=+e.target.value;render()};
$("#minv").onchange=e=>{F.minv=+e.target.value;render()};
$("#sort").onchange=e=>{F.sort=e.target.value;render()};
$("#q").oninput=e=>{F.q=e.target.value.toLowerCase();render()};
$("#hideno").onclick=()=>{F.hideno=!F.hideno;$("#hideno").style.borderColor=F.hideno?'var(--acc)':'';render()};
$("#export").onclick=()=>{const out=DATA.filter(d=>(picks[key(d)]||{}).p==="yes")
  .map(d=>{const o=picks[key(d)]||{};return {name:d.n,city:d.city,cat:d.cat,type:d.type,rating:d.r,
    reviews:d.rv,sub:d.sub,url:d.url,matijaNote:o.m||"",tundiNote:o.t||""};});
  $("#out").value=JSON.stringify(out,null,2);$("#dn").textContent=out.length;$("#dlg").showModal();};
$("#copy").onclick=()=>{$("#out").select();document.execCommand("copy");$("#copy").textContent="Copied!";setTimeout(()=>$("#copy").textContent="Copy",1200)};
render();
</script></body></html>
