<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Discover activities — Matija & Tündi</title>
<style>
:root{--bg:#0f1115;--card:#1a1d24;--line:#2a2f3a;--txt:#e8eaed;--mut:#9aa0aa;--acc:#ffb000;--ok:#2ecc71;--no:#e74c3c;--exp:#a98bff;--ven:#4db6ff}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.4 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
header{position:sticky;top:0;z-index:10;background:#11141a;border-bottom:1px solid var(--line);padding:10px 14px}
h1{margin:0 0 8px;font-size:16px}
.sitenav{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.sitenav a,.sitenav .herepg{font-weight:700;font-size:12px;text-decoration:none;padding:4px 10px;border-radius:7px;border:1px solid var(--line);color:var(--mut)}
.sitenav a:hover{border-color:var(--acc);color:var(--txt)}
.sitenav .herepg{background:var(--acc);color:#000;border-color:var(--acc)}
.authbar{display:flex;gap:7px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.auin{background:var(--card);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:6px 9px;font-size:13px}
.hint{color:var(--mut);font-size:12px}
.loggedin{color:var(--ok);font-size:13px;font-weight:600}
.loggedin b{color:var(--acc)}
.bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.bar select,.bar input[type=search]{background:var(--card);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:6px 9px;font-size:13px}
.bar label{color:var(--mut);font-size:12px;display:flex;align-items:center;gap:5px}
.seg{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
.seg button{background:var(--card);color:var(--mut);border:0;padding:6px 11px;cursor:pointer;font-size:13px}
.seg button.on{background:var(--acc);color:#000;font-weight:600}
.stats{color:var(--mut);font-size:12px;margin-left:auto;display:flex;gap:14px;align-items:center}
.stats b{color:var(--txt)}
.btn{background:var(--card);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:6px 11px;cursor:pointer;font-size:13px}
.btn:hover{border-color:var(--acc)}
.groups{display:flex;flex-direction:column;gap:10px;padding:14px;max-width:1500px;margin:0 auto}
.activity-group{background:#14171d;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.activity-group[open]{border-color:#3b4351;background:#161a21}
.group-summary{list-style:none;cursor:pointer;display:grid;grid-template-columns:40px minmax(0,1fr) auto 20px;gap:10px;align-items:center;padding:13px 15px;user-select:none}
.group-summary::-webkit-details-marker{display:none}
.group-summary:hover{background:#1a1e26}
.group-icon{width:40px;height:40px;border-radius:10px;background:#20252f;display:grid;place-items:center;font-size:21px}
.group-copy{min-width:0;display:flex;flex-direction:column;gap:2px}
.group-title{font-size:14px;font-weight:700;color:var(--txt)}
.group-preview{font-size:11.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.group-meta{display:flex;gap:7px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
.group-count,.group-rated{font-size:11px;padding:3px 7px;border-radius:999px;background:#242a34;color:#c8cdd5;white-space:nowrap}
.group-rated.has{color:var(--ok)}
.group-review-statuses{display:flex;gap:4px;align-items:center}
.group-review-status{font-size:10.5px;font-weight:700;padding:3px 6px;border:1px solid #343b47;border-radius:999px;background:#1b2028;color:#858c97;white-space:nowrap}
.group-review-status.mn.done{border-color:#245e7d;color:var(--ven);background:#14232d}
.group-review-status.tn.done{border-color:#57477d;color:var(--exp);background:#211b31}
.group-review-status.stale{border-color:#6f5a28;color:#e2b84f;background:#2a2416}
.group-review-status.pending{font-weight:500;color:#858c97}
.group-chevron{color:var(--mut);font-size:18px;transition:transform .18s ease}
.activity-group[open] .group-chevron{transform:rotate(180deg)}
.group-collab{padding:11px 14px 12px;border-top:1px solid var(--line);background:#11151b}
.group-collab-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:9px}
.group-collab-title{font-size:12px;font-weight:800;color:#e1e5eb}
.group-collab-help{margin-left:6px;color:var(--mut);font-size:10.5px;font-weight:400}
.group-shortcut{color:#7f8792;font-size:10.5px;text-align:right}
.group-note-lanes{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}
.group-note-lane{min-width:0;padding:8px;border:1px solid #303642;border-radius:9px;background:#181c23}
.group-note-lane.mn{border-left:3px solid var(--ven)}
.group-note-lane.tn{border-left:3px solid var(--exp)}
.group-note-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:7px}
.group-note-who{font-size:11.5px;font-weight:800}
.group-note-lane.mn .group-note-who{color:var(--ven)}
.group-note-lane.tn .group-note-who{color:var(--exp)}
.group-reviewed-label{display:flex;align-items:center;gap:5px;min-height:28px;padding:3px 6px;border-radius:6px;color:#cbd0d7;font-size:10.5px;cursor:pointer;white-space:nowrap}
.group-reviewed-label input{accent-color:var(--ok);margin:0}
.group-reviewed-label:has(input:focus-visible){outline:2px solid var(--acc);outline-offset:1px}
.group-reviewed-label.blocked{cursor:not-allowed;color:#7f8792}
.group-stale-note{padding:1px 4px;border-radius:999px;background:#3b3018;color:#e2b84f;font-size:9px;font-weight:700}
.group-note{display:block;width:100%;min-height:29px;max-height:180px;resize:vertical;overflow-y:auto;padding:5px 7px;border:1px solid var(--line);border-radius:6px;background:#0f1115;color:var(--txt);font:11px/1.45 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;white-space:pre-wrap;word-break:break-word}
.group-note::placeholder{color:#5b636e}
.group-note-lane.ro{opacity:.72}
.group-note-lane.ro .group-reviewed-label{cursor:default}
.group-note[readonly]{cursor:default;background:#14171d}
.group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;padding:12px;border-top:1px solid var(--line)}
.group-grid:empty{display:none}
.card{background:var(--card);border:1px solid var(--line);border-radius:11px;overflow:hidden;display:flex;flex-direction:column}
.card.rated{outline:2px solid var(--ok)}
.ph{height:130px;background:#222 center/cover no-repeat;position:relative}
.ph .badges{position:absolute;top:6px;left:6px;display:flex;gap:4px}
.tag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px;background:#000a;backdrop-filter:blur(2px)}
.tag.ven{color:var(--ven)} .tag.exp{color:var(--exp)} .tag.idea{color:#ffd66b} .tag.bdg{color:var(--acc)}
.tag.suggested{color:#ffe69a;background:#3b2e0dcc}
.ph.idea-ph{display:grid;place-items:center;background:radial-gradient(circle at 28% 24%,#344b42 0,#20332f 38%,#171c22 74%)}
.ph.idea-ph::before{content:attr(data-icon);font-size:58px;filter:drop-shadow(0 7px 12px #0008)}
.body{padding:9px 10px;display:flex;flex-direction:column;gap:5px;flex:1}
.nm{font-weight:600;font-size:13.5px;line-height:1.25}
.nm a{color:var(--txt);text-decoration:none}
.nm a:hover{color:var(--acc);text-decoration:underline}
.meta{color:var(--mut);font-size:12px;display:flex;gap:8px;flex-wrap:wrap}
.star{color:var(--acc);font-weight:600}
.sub{color:var(--mut);font-size:11.5px;font-style:italic}
.blurb{color:#c4c9d2;font-size:11.5px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.activity-brief{margin:3px 0 2px;border:1px solid #3b4351;border-radius:8px;background:#11151b;overflow:hidden}
.brief-summary{display:grid;grid-template-columns:minmax(0,1fr) auto 14px;gap:4px 7px;align-items:center;min-height:40px;padding:7px 8px;background:#202630;color:#e8edf4;cursor:pointer;list-style:none}
.brief-summary::-webkit-details-marker,.activity-price summary::-webkit-details-marker{display:none}
.brief-title{font-size:10.5px;font-weight:800}
.brief-summary .grounded{color:#73dda0;font-size:9.5px;font-weight:700}
.brief-take{grid-column:1/3;color:#e1e6ed;font-size:11.5px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.brief-chevron{grid-column:3;grid-row:1/3;color:#9ba5b4;transition:transform .15s}
.activity-brief[open] .brief-chevron{transform:rotate(180deg)}
.activity-brief[open] .brief-take{-webkit-line-clamp:unset}
.brief-row{display:grid;grid-template-columns:68px minmax(0,1fr);gap:7px;padding:6px 8px;border-top:1px solid #2a303a;font-size:11.5px;line-height:1.4}
.brief-label{color:#cbbcff;font-size:9.5px;font-weight:800;letter-spacing:.035em;text-transform:uppercase}
.brief-copy{color:#d7dce4;overflow-wrap:anywhere}
.brief-row.reviews .brief-label{color:#82d6aa}
.brief-sources{display:flex;gap:10px;flex-wrap:wrap;padding:6px 8px;border-top:1px solid #2a303a}
.brief-source{color:#8fd0ff;font-size:10px;text-decoration:none}
.brief-source:hover{text-decoration:underline}
.activity-price{margin:3px 0 2px;border:1px solid #354537;border-radius:8px;background:#111814;color:#dce7df;overflow:hidden;font-size:10.5px}
.activity-price summary,.price-summary{display:flex;align-items:center;gap:6px;min-height:38px;padding:7px 8px;list-style:none}
.activity-price summary{cursor:pointer}
.price-icon{flex:none}.price-summary-main{font-size:11.5px}.price-option-count{margin-left:auto;padding:2px 6px;border-radius:999px;background:#243129;color:#a9dbb9;font-weight:700}
.price-panel,.price-single-package,.price-context,.price-note,.price-source{padding:0 8px 7px}
.price-panel{border-top:1px solid #2a3a2d;padding-top:7px}
.price-options{display:flex;flex-direction:column;gap:6px;margin:0 0 7px;padding:0;list-style:none}
.price-package{padding:7px;border:1px solid #2d4132;border-radius:7px;background:#151d18}
.price-package-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.price-package-name{font-weight:700;color:#eef4ef}.price-package-amount{color:#8ee0a6;white-space:nowrap}
.price-package-description,.price-package-meta{margin-top:4px;color:#b8c2bb;line-height:1.35}
.price-package-source,.price-source{margin-top:4px}.price-package-source a,.price-source a{color:#8fd0ff}
.price-context,.price-note,.price-source{color:#9fab9f;line-height:1.35}.price-context-label{font-weight:700;color:#cbd8ce}
.price-single-package{border-top:1px solid #2a3a2d;padding-top:7px}
.price-single .price-summary+.price-single-package{padding-bottom:5px}
.price-status-date-required,.price-status-not-published{border-color:#4b4636;background:#181711}.price-status-unavailable{border-color:#52383b;background:#1a1213}
.cat{font-size:10.5px;color:#7d8590}
.lanes{display:flex;flex-direction:column;gap:5px;margin-top:auto;padding-top:7px;border-top:1px solid var(--line)}
.lane{display:flex;align-items:flex-start;gap:6px}
.lane .who{font-size:11px;font-weight:700;width:46px;flex:none;padding-top:6px}
.lane.mn .who{color:var(--ven)} .lane.tn .who{color:var(--exp)}
.stars{display:flex;gap:1px;flex:none;padding-top:3px}
.st{font:inherit;font-size:15px;color:#3a4150;line-height:1;background:none;border:0;padding:0;cursor:default}
.st.on{color:var(--acc)}
.lane.editable .st{cursor:pointer}
.lane.editable .st:focus-visible{outline:2px solid var(--acc);outline-offset:2px;border-radius:2px}
.lane.editable .st:hover,.lane.editable .st:hover~.st{}
.lnote{flex:1;min-width:0;font:inherit;font-size:11px;font-family:inherit;line-height:1.45;padding:4px 6px;border-radius:5px;border:1px solid var(--line);background:#0f1115;color:var(--txt);resize:vertical;min-height:26px;max-height:240px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}
.lnote::placeholder{color:#5b636e}
.lane.mn .lnote{border-left:2px solid var(--ven)} .lane.tn .lnote{border-left:2px solid var(--exp)}
.lnote[readonly]{opacity:.7;cursor:default;background:#14171d}
.locked{color:var(--mut);font-size:10.5px;text-align:center;padding:3px}
.empty{padding:40px;text-align:center;color:var(--mut)}
dialog{background:var(--card);color:var(--txt);border:1px solid var(--line);border-radius:11px;max-width:640px;width:90%}
dialog textarea{width:100%;height:300px;background:#0f1115;color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:8px;font:12px monospace}
@media(max-width:760px){
  header{position:static}.stats{margin-left:0;width:100%;gap:8px;flex-wrap:wrap}.group-summary{grid-template-columns:34px minmax(0,1fr) 18px;padding:11px}.group-icon{width:34px;height:34px;font-size:18px}.group-meta{grid-column:2;justify-content:flex-start}.group-chevron{grid-column:3;grid-row:1}.group-collab{padding:10px}.group-collab-head{align-items:flex-start;flex-direction:column;gap:3px}.group-shortcut{text-align:left}.group-note-lanes{grid-template-columns:1fr}.group-reviewed-label{min-height:34px;padding:6px 8px}.group-grid{grid-template-columns:1fr;padding:9px}.groups{padding:9px}.group-preview{white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}.activity-price summary,.price-summary{min-height:44px}.price-package-head{flex-direction:column;gap:3px}.price-package-amount{white-space:normal}}
</style></head><body>

function clearPendingNoteTimers(){ noteTimers.forEach(p=>clearTimeout(p.timer)); noteTimers.clear(); }
function clearCloudState(){
  cloud={}; members={}; adminMode=false; cloudReady=false; syncError=""; rowIndex.clear();
  localMutations.clear(); latestMutationSeqs.clear(); saveQueues.clear(); confirmedRows.clear(); pendingRealtimeEvents.length=0;

async function configureRealtime(session,accessKey,generation){
  const configSeq=++realtimeConfigSeq;
  try{
    await (session?.access_token?sb.realtime.setAuth(session.access_token):sb.realtime.setAuth());
    if(configSeq!==realtimeConfigSeq||generation!==authGeneration||accessKey!==authAccessKey) return;
    if(!session?.user){
      if(picksChannel) await sb.removeChannel(picksChannel);
      picksChannel=null; realtimeUserId=null; return;
    }
    if(picksChannel&&realtimeUserId===session.user.id) return;
    if(picksChannel) await sb.removeChannel(picksChannel);
    if(configSeq!==realtimeConfigSeq||generation!==authGeneration||accessKey!==authAccessKey) return;
    picksChannel=sb.channel("picks-sync")
      .on("postgres_changes",{event:"*",schema:"public",table:"picks"},handleRealtimeChange)
      .subscribe(status=>{ if(status==="CHANNEL_ERROR"||status==="TIMED_OUT") console.error("realtime",status); });
    realtimeUserId=session.user.id;
  }catch(e){ console.error("realtime auth",e.message||e); }
}
function applySession(session){
  const next=session?.user||null;
  const nextAccessKey=next?`${next.id}:${next.app_metadata?.trip_role||""}`:"";
  const changed=nextAccessKey!==authAccessKey;
  me=next;
  if(!changed){ configureRealtime(session,nextAccessKey,authGeneration); paintAuth(); return; }
  authAccessKey=nextAccessKey; authGeneration++;
  clearPendingNoteTimers(); clearCloudState();
  configureRealtime(session,nextAccessKey,authGeneration);
  paintAuth(); render();                                    // browse immediately, edit only after a complete load
  if(!me) return;
  const generation=authGeneration;
  loadCloud(generation).then(snapshot=>{
    if(generation!==authGeneration||nextAccessKey!==authAccessKey) return;
    cloud=snapshot.cloud; members=snapshot.members; adminMode=snapshot.adminMode;
    seedConfirmedRows(cloud);
    snapshot.rows.forEach(indexRow); cloudReady=true; syncError="";
    replayBufferedRealtimeChanges();
    paintAuth(); render();
  }).catch(e=>{
    if(generation!==authGeneration) return;
    pendingRealtimeEvents.length=0;
    syncError="sync unavailable — reload";
    console.error("loadCloud",e.message||e); paintAuth(); render();
  });
}
// CRITICAL: never `await` supabase calls INSIDE onAuthStateChange — it deadlocks the auth

sb.auth.onAuthStateChange((_event,session)=>{ setTimeout(()=>applySession(session),0); });

function indexRow(r){ if(r?.id) rowIndex.set(r.id,{pk:canonicalPlaceKey(r.place_key),userId:r.user_id}); }
async function fetchAllPicks(generation){
  const rows=[],pageSize=1000;
  for(let from=0;;from+=pageSize){
    const {data,error}=await sb.from("picks").select("*").order("id",{ascending:true}).range(from,from+pageSize-1);
    if(generation!==authGeneration) throw new Error("stale auth load");
    if(error) throw new Error(error.message);
    rows.push(...(data||[]));
    if((data||[]).length<pageSize) return rows;
  }
}
async function loadCloud(generation){
  const [rows,membersRes,adminRes]=await Promise.all([
    fetchAllPicks(generation),
    sb.from("trip_members").select("person_key,display_name,user_id"),
    sb.rpc("is_trip_admin")
  ]);
  if(generation!==authGeneration) throw new Error("stale auth load");
  if(membersRes.error) throw new Error(membersRes.error.message);
  if(adminRes.error) throw new Error(adminRes.error.message);
  const nextCloud={},nextMembers={};
  rows.forEach(r=>{
    const pk=canonicalPlaceKey(r.place_key),bucket=nextCloud[pk]||(nextCloud[pk]={}),current=bucket[r.user_id];
    const candidateCanonical=r.place_key===pk,candidate={...r,place_key:pk,_canonicalSource:candidateCanonical},currentCanonical=current?._canonicalSource===true;
    if(!current||candidateCanonical&&!currentCanonical||candidateCanonical===currentCanonical&&String(r.updated_at||"")>String(current.updated_at||"")) bucket[r.user_id]=candidate;
  });
  (membersRes.data||[]).forEach(m=>{ nextMembers[m.person_key]=m; });
  return {rows,cloud:nextCloud,members:nextMembers,adminMode:adminRes.data===true};
}
function rowOf(pk,person){

function refreshCloudChange(pk,wasRelevant,patch=true,preserveActive=true){

function saveFor(pk,person,patch){
  if(!cloudReady||!canEdit(person)) return;
  const userId=targetUserId(person); if(!userId) return;
  const generation=authGeneration,wasRelevant=hasRelevantRating(pk);
  const bucket=cloud[pk]||(cloud[pk]={});
  const previous=bucket[userId]?{...bucket[userId]}:{};

    catch(e){ error=e; }
    if(!error){

function isStaleRealtimeRow(incoming,current){
  const incomingStamp=String(incoming?.updated_at||""),currentStamp=String(current?.updated_at||"");
  return Boolean(incomingStamp&&currentStamp&&incomingStamp<currentStamp);
}
function applyRealtimeChange(p,refresh=true){
  if(p.eventType==="DELETE"){
    const info=rowIndex.get(p.old?.id)||(p.old?.place_key&&p.old?.user_id?{pk:canonicalPlaceKey(p.old.place_key),userId:p.old.user_id}:null);
    if(!info) return;
    const wasRelevant=hasRelevantRating(info.pk);
    if(cloud[info.pk]) delete cloud[info.pk][info.userId];
    confirmedRows.delete(laneKey(info.userId,info.pk));
    if(p.old?.id) rowIndex.delete(p.old.id);
    if(refresh) refreshCloudChange(info.pk,wasRelevant,true,false); return;
  }
  const incoming=p.new; if(!incoming?.place_key||!incoming?.user_id) return;
  const pk=canonicalPlaceKey(incoming.place_key),row={...incoming,place_key:pk},bucket=cloud[pk]||(cloud[pk]={}),current=bucket[row.user_id]||{};
  if(isStaleRealtimeRow(row,current)) return;
  rememberConfirmedRow(row);
  const wasRelevant=hasRelevantRating(pk),preserved=consumeLocalEcho(row,current);
  const merged={...current,...row,...preserved};
  const uiChanged=UI_FIELDS.some(field=>(merged[field]??null)!==(current[field]??null));

}
function handleRealtimeChange(p){

  applyRealtimeChange(p);
}
function replayBufferedRealtimeChanges(){
  pendingRealtimeEvents.splice(0).forEach(p=>applyRealtimeChange(p,false));
}

}

  seg.querySelectorAll("button").forEach(x=>{x.classList.remove("on");x.setAttribute("aria-pressed","false")});b.classList.add("on");b.setAttribute("aria-pressed","true");

$("#export").onclick=()=>{
  if(!me||!cloudReady) return;
  const activities=DATA.filter(d=>Object.values(cloud[key(d)]||{}).some(r=>r.rating>0||(r.note||"").trim()))
    .map(d=>{const pk=key(d),m=rowOf(pk,"matija")||{},t=rowOf(pk,"tundi")||{};
      const brief=activityBrief(d),pricing=activityPricing(d);
      return {name:d.n,city:d.city,cat:d.cat,type:d.type,rating:d.r,reviews:d.rv,url:d.url,
        ...(brief?{activityBrief:{what:brief.what,do:brief.do,why:brief.why,reviewSummary:brief.reviewSummary||null,reviewsUsed:brief.reviewsUsed||0,source:brief.source,reviewSource:brief.reviewSource||null,checkedAt:brief.checkedAt}}:{}),
        ...(pricing?{pricing}:{}),
        matijaStars:m.rating||0,matijaNote:m.note||"",tundiStars:t.rating||0,tundiNote:t.note||""};});
  const categories=[...new Set(DATA.map(d=>d.city))].flatMap(city=>GROUPS.flatMap(group=>{
    const pk=groupKeyFor(city,group.id),m=rowOf(pk,"matija")||{},t=rowOf(pk,"tundi")||{};
    const record=COLLAB.categoryExportRecord({city,groupId:group.id,title:group.title,inventoryRevision:groupRevision(pk),matijaRow:m,tundiRow:t});
    return record?[record]:[];
  }));
  const out={schemaVersion:3,activities,categories};
  $("#out").value=JSON.stringify(out,null,2);$("#dn").textContent=activities.length;$("#dg").textContent=categories.length;$("#dlg").showModal();};
$("#copy").onclick=()=>{$("#out").select();document.execCommand("copy");$("#copy").textContent="Copied!";setTimeout(()=>$("#copy").textContent="Copy",1200)};

initAuth();
